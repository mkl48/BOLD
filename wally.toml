[package]
name = "kr3ative/bold"
version = "0.1.0"
description = "A rich chat & messaging interface for Roblox - markdown parsing, mentions, emoji, embeds, and a themeable message UI driven by a single Start call."
license = "MIT"
authors = ["kr3ative"]
registry = "https://github.com/UpliftGames/wally-index"
realm = "shared"
include = ["default.project.json", "wally.toml", "src", "README.md", "LICENSE"]

[dependencies]
# Bold vendors its runtime deps (Promise, Signal, Substance, Switch) under
# src/_Packages, matching the rest of the suite. Switch powers the keybinds and
# is resolved dynamically; Bold falls back to UserInputService if it is missing.
